<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AA Logo Watermark</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            padding: 14px;
            background: #f5f7fb;
            margin: 0;
            overflow-x: hidden;
            color: #222;
        }

        h1 {
            font-size: 16px;
            font-weight: 600;
            margin: 0 0 6px 0;
        }
        h1 .sub { font-size: 11px; color: #8a90a0; font-weight: 500; }

        /* Photopea bridge buttons */
        .pp-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .pp-btn {
            flex: 1;
            padding: 10px 6px;
            border-radius: 10px;
            border: 1px solid #d6dae6;
            background: white;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            color: #2b7cff;
            cursor: pointer;
            transition: 0.15s ease;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .pp-btn:hover { background: #eef4ff; border-color: #2b7cff; }
        .pp-btn:disabled { opacity: .5; cursor: default; }

        .dimension-select {
            width: 100%;
            padding: 11px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: #444;
            background: white url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23444" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4"/></svg>') no-repeat right 12px center;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: 0.2s ease;
        }
        .dimension-select:hover { border-color: #2b7cff; }
        .dimension-select:focus { outline: none; border-color: #2b7cff; box-shadow: 0 0 0 3px rgba(43,124,255,.2); }

        #drop-zone {
            border: 2px dashed #2b7cff;
            border-radius: 14px;
            padding: 28px 14px;
            text-align: center;
            background: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #444;
            transition: 0.2s ease;
        }
        #drop-zone:hover { background: #eef4ff; }
        #fileInput { display: none; }

        #logoWarn {
            display: none;
            margin-top: 10px;
            padding: 9px 11px;
            border-radius: 10px;
            background: #ffebe9;
            color: #b3261e;
            font-size: 12px;
            font-weight: 500;
            line-height: 1.4;
        }
        #logoWarn button {
            margin-top: 8px; width: auto; padding: 7px 12px; font-size: 12px;
            background: #b3261e; color:#fff;
        }

        .checkboxes-wrapper {
            display: flex; flex-wrap: wrap; gap: 10px 18px;
            align-items: center; margin-top: 14px;
        }
        .checkbox-container {
            display: flex; align-items: center; gap: 7px;
            font-size: 13px; font-weight: 500; color: #444; cursor: pointer;
        }
        .checkbox-container input { cursor: pointer; width: 16px; height: 16px; accent-color: #2b7cff; }

        button {
            margin-top: 16px; width: 100%; padding: 14px; border-radius: 12px;
            border: none; font-weight: 600; font-size: 15px; font-family: inherit;
            background: linear-gradient(135deg, #10b981, #059669); color: white;
            cursor: pointer; transition: 0.2s ease;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(16,185,129,.25); }
        button:disabled { opacity:.7; cursor:default; transform:none; box-shadow:none; }

        #status { margin-top: 10px; font-size: 12px; color: #6b7280; min-height: 16px; text-align:center; }

        #applyCropBtn {
            margin-top: 0; padding: 10px 0; width: 85px; font-size: 14px;
            background: linear-gradient(135deg, #2b7cff, #1a5ed8); text-align: center;
        }
        #applyCropBtn:hover { box-shadow: 0 6px 18px rgba(43,124,255,.25); }

        #thumbnailContainer {
            margin-top: 16px; display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 28px 10px;
        }
        .thumb-wrapper { position: relative; width: 100%; aspect-ratio: 3/2; min-width: 0; }
        .thumb {
            width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
            border: 1px solid #e5e7eb; cursor: pointer; transition: 0.25s ease;
        }
        .thumb:hover { transform: scale(1.04); box-shadow: 0 8px 16px rgba(0,0,0,.15); }
        .remove-btn {
            position: absolute; top: -6px; right: -6px; background: #ff4d4f; color: white;
            font-size: 12px; width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-weight: bold; z-index: 2;
        }
        .cropped-badge {
            position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
            background: #e6f4ea; color: #1e8e3e; padding: 3px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 600; white-space: nowrap;
        }
        .uncropped-badge {
            position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
            background: #ffebe9; color: #d93025; padding: 3px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 600; white-space: nowrap;
        }

        #previewModal {
            display: none; position: fixed; inset: 0; backdrop-filter: blur(10px);
            background: rgba(0,0,0,.65); align-items: center; justify-content: center;
            flex-direction: column; z-index: 999;
        }
        #closeModalBtn {
            position: absolute; top: 10px; right: 10px; width: 32px; height: 32px;
            background: #ef4444; color: white; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s ease; z-index: 1001; box-shadow: 0 4px 12px rgba(0,0,0,.25);
        }
        #closeModalBtn:hover { background: #b91c1c; transform: scale(1.1); }
        #cropEditorContainer {
            position: relative; display: inline-block; max-width: 88vw; max-height: 70vh;
            border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,.45); background: #111; overflow: hidden;
        }
        #cropImage { display: block; max-width: 100%; max-height: 70vh; user-select: none; -webkit-user-drag: none; }
        #cropBox {
            position: absolute; box-shadow: 0 0 0 9999px rgba(0,0,0,.6);
            border: 2px solid rgba(255,255,255,.8); cursor: move; box-sizing: border-box;
        }
        .grid-line { position: absolute; background: rgba(255,255,255,.65); }
        .h-line { width: 100%; height: 1px; }
        .v-line { height: 100%; width: 1px; }
        #zoomSlider { flex: 1; margin: 0; }
        .crop-toolbar {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            margin-top: 22px; width: 90%; max-width: 450px; z-index: 1000;
        }
        .preview-btn {
            background: white; border-radius: 50%; width: 44px; height: 44px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 18px; color: #444; box-shadow: 0 4px 12px rgba(0,0,0,.2); transition: 0.2s ease;
        }
        .preview-btn:hover { transform: scale(1.1); }
        #undoCropBtn {
            margin-top: 0; padding: 10px 0; width: 85px; font-size: 14px;
            background: linear-gradient(135deg, #ef4444, #b91c1c); text-align: center; display: none;
        }

        .thumb-wrapper.sortable-ghost { opacity: 0.4; transform: scale(0.95); background: #f0f0f0; }
        .thumb-wrapper.sortable-drag { cursor: grabbing !important; opacity: 0.9; box-shadow: 0 10px 25px rgba(0,0,0,.3); }

        /* numbered drag handle — grab to reorder (GIF frame order) */
        .order-chip {
            position: absolute; top: -6px; left: -6px; z-index: 3;
            min-width: 22px; height: 22px; padding: 0 5px; border-radius: 11px;
            background: #2b7cff; color: #fff; font-size: 12px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 3px;
            cursor: grab; user-select: none; box-shadow: 0 2px 6px rgba(43,124,255,.4);
        }
        .order-chip:active { cursor: grabbing; }
        .order-chip .grip { font-size: 10px; opacity: .85; line-height: 1; }

        #gifHint {
            display: none; margin-top: 14px; padding: 8px 11px; border-radius: 10px;
            background: #eef4ff; color: #1a5ed8; font-size: 12px; font-weight: 500; line-height: 1.4;
        }
        .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
        .topbar h1 { margin:0; }
        .lang-toggle { display:inline-flex; border:1px solid #d6dae6; border-radius:8px; overflow:hidden; }
        .lang-btn { margin:0; width:auto; padding:5px 11px; font-size:12px; font-weight:700; background:#fff; color:#2b7cff; border:none; border-radius:0; cursor:pointer; transition:.15s ease; }
        .lang-btn:hover { background:#eef4ff; transform:none; box-shadow:none; }
        .lang-btn.active { background:#2b7cff; color:#fff; }
    </style>
</head>

<body>

    <div class="topbar">
        <h1>AA Logo Watermark <span class="sub">· Photopea</span></h1>
        <div class="lang-toggle">
            <button id="langTr" class="lang-btn">TR</button>
            <button id="langEn" class="lang-btn">EN</button>
        </div>
    </div>

    <div class="pp-row" id="ppRow">
        <button class="pp-btn" id="importBtn" title="Photopea'da açık olan görseli buraya al">⤵ Görseli al</button>
    </div>

    <select id="dimensionSelect" class="dimension-select">
        <option id="opt720" value="1080x720" selected>1080 x 720 (Yatay)</option>
        <option id="opt1080" value="1080x1080">1080 x 1080 (Kare)</option>
        <option id="opt1350" value="1080x1350">1080 x 1350 (Dikey)</option>
        <option id="opt978" value="978x548">978 x 548 (Yatay)</option>
    </select>

    <div id="drop-zone">
        Fotoğrafları sürükleyin, tıklayın veya ZIP yükleyin
    </div>

    <input type="file" id="fileInput" multiple accept="image/*,.zip">

    <div id="logoWarn"></div>

    <div class="checkboxes-wrapper">
        <label class="checkbox-container">
            <input type="checkbox" id="gifCheckbox" /> <span id="lbl_gif">GIF olarak indir</span>
        </label>
        <label class="checkbox-container">
            <input type="checkbox" id="leftLogoCheckbox" /> <span id="lbl_left">Logoyu sola yerleştir</span>
        </label>
        <label class="checkbox-container">
            <input type="checkbox" id="openInPpCheckbox" /> <span id="lbl_openpp">Sonucu Photopea'da aç</span>
        </label>
    </div>

    <button id="processBtn">Logo Ekle ve İndir</button>
    <div id="status"></div>

    <div id="gifHint">🎞️ GIF karesi sırası: numaralı tutamağı (⠿) sürükleyin — 1 ilk kare, 2 ikinci…</div>

    <div id="thumbnailContainer"></div>

    <div id="previewModal">
        <div id="closeModalBtn">✕</div>
        <div id="cropEditorContainer">
            <img id="cropImage">
            <div id="cropBox">
                <div class="grid-line h-line" style="top: 33.33%;"></div>
                <div class="grid-line h-line" style="top: 66.66%;"></div>
                <div class="grid-line v-line" style="left: 33.33%;"></div>
                <div class="grid-line v-line" style="left: 66.66%;"></div>
            </div>
        </div>
        <div class="crop-toolbar">
            <div id="prevBtn" class="preview-btn">&#10094;</div>
            <input type="range" id="zoomSlider" min="0" max="1" step="0.001" value="0">
            <button id="applyCropBtn">Kırp</button>
            <button id="undoCropBtn">Geri Al</button>
            <div id="nextBtn" class="preview-btn">&#10095;</div>
        </div>
    </div>

    <script src="jszip.min.js"></script>
    <script src="pica.min.js"></script>
    <script src="gif.js"></script>
    <script src="Sortable.min.js"></script>
    <script>

    function getTargetDimensions() {
        const val = dimensionSelect.value;
        const [w, h] = val.split('x').map(Number);
        return { w, h };

    dimensionSelect.addEventListener("change", () => {
        for (let i = 0; i < selectedFiles.length; i++) {
            if (selectedFiles[i].isCropped) {
                selectedFiles[i] = selectedFiles[i].originalFile || selectedFiles[i];
                selectedFiles[i].isCropped = false;
            }
            if (cropDataArray[i]) cropDataArray[i] = null;
        }

    /* ============================ FILE INPUT ============================ */
    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", async (e) => { await handleFiles(Array.from(e.target.files)); });
    dropZone.addEventListener("dragover", (e) => e.preventDefault());
    dropZone.addEventListener("drop", async (e) => {
        e.preventDefault();
        await handleFiles(Array.from(e.dataTransfer.files));
    });

    async function handleFiles(files) {
        for (let file of files) {
            if (file.name && file.name.toLowerCase().endsWith(".zip")) {
                await extractZip(file);
            } else if ((file.type && file.type.startsWith("image/")) || file.isImported) {
                selectedFiles.push(file);
                cropDataArray.push(null);
            }
        }
        renderThumbnails();
    }

    async function extractZip(zipFile) {
        const zip = await JSZip.loadAsync(zipFile);
        const entries = Object.values(zip.files);
        for (let entry of entries) {
            if (!entry.dir && /\.(jpg|jpeg|png|webp)$/i.test(entry.name)) {
                const blob = await entry.async("blob");
                const file = new File([blob], entry.name.split('/').pop(), { type: blob.type });
                selectedFiles.push(file);
                cropDataArray.push(null);
            }
        }
    }

    /* ============================ THUMBNAILS ============================ */
    function renderThumbnails() {
        thumbnailContainer.innerHTML = "";
        selectedFiles.forEach((file, index) => {
            const dims = getTargetDimensions();
            const wrapper = document.createElement("div");
            wrapper.className = "thumb-wrapper";
            wrapper.style.aspectRatio = `${dims.w}/${dims.h}`;

            const img = document.createElement("img");
            img.className = "thumb";
            img.addEventListener("click", () => openPreview(index));

            // numbered drag handle — grab to reorder (sets the GIF frame order)
            const chip = document.createElement("div");
            chip.className = "order-chip";
            chip.title = t('chip_title');
            chip.innerHTML = '<span class="grip">⠿</span><span>' + (index + 1) + '</span>';

            const removeBtn = document.createElement("div");
            removeBtn.className = "remove-btn";
            removeBtn.innerHTML = "✕";
            removeBtn.addEventListener("click", (ev) => {
                ev.stopPropagation();
                selectedFiles.splice(index, 1);
                cropDataArray.splice(index, 1);
                renderThumbnails();
            });

            wrapper.appendChild(img);
            wrapper.appendChild(chip);
            wrapper.appendChild(removeBtn);

            const badge = document.createElement("div");
            badge.className = file.isCropped ? "cropped-badge" : "uncropped-badge";
            badge.innerText = file.isCropped ? t('b_cropped') : t('b_uncropped');
            wrapper.appendChild(badge);

            thumbnailContainer.appendChild(wrapper);

            const reader = new FileReader();
            reader.onload = (e) => { img.src = e.target.result; };
            reader.readAsDataURL(file);
        });

        updateGifHint();

        if (selectedFiles.length > 0 && !sortableInstance) {
            sortableInstance = new Sortable(thumbnailContainer, {
                animation: 200,
                handle: '.order-chip',   // drag only by the numbered handle; clicking the image still opens crop
                ghostClass: 'sortable-ghost',
                dragClass: 'sortable-drag',
                onEnd: function (evt) {
                    if (evt.oldIndex === evt.newIndex) return;
                    const draggedFile = selectedFiles.splice(evt.oldIndex, 1)[0];
                    const draggedCrop = cropDataArray.splice(evt.oldIndex, 1)[0];
                    selectedFiles.splice(evt.newIndex, 0, draggedFile);
                    cropDataArray.splice(evt.newIndex, 0, draggedCrop);
                    renderThumbnails();   // re-number the chips after reordering
                }
            });
        }
    }

    // The frame-order hint is only relevant when building a GIF from 2+ images.
    function updateGifHint() {
        gifHint.style.display = (selectedFiles.length > 1 && gifCheckbox.checked) ? "block" : "none";
    }
    gifCheckbox.addEventListener("change", updateGifHint);

    /* ============================ CROP EDITOR ============================ */
    let boxWidth, boxHeight, boxLeft, boxTop, imgWidth, imgHeight;

    function updateCropBoxDOM() {
        cropBox.style.width = boxWidth + 'px';
        cropBox.style.height = boxHeight + 'px';
        cropBox.style.left = boxLeft + 'px';
        cropBox.style.top = boxTop + 'px';

        let maxW = imgWidth, maxH = imgHeight;
        let dims = getTargetDimensions();
        let cropRatio = dims.w / dims.h;
        if (cropImage.naturalWidth <= 864 && cropImage.naturalHeight <= 486) {
            cropRatio = cropImage.naturalWidth / cropImage.naturalHeight;
        }
        let maxBoxW = (maxW / maxH > cropRatio) ? maxH * cropRatio : maxW;
        let cropScale = boxWidth / maxBoxW;
        let zoomValue = (1.0 - cropScale) / 0.9;
        if (zoomValue < 0) zoomValue = 0;
        if (zoomValue > 1) zoomValue = 1;
        zoomSlider.value = zoomValue;

        cropDataArray[currentIndex] = { boxWidth, boxHeight, boxLeft, boxTop, imgWidth, imgHeight };
    }

    function initCropBox() {
        imgWidth = cropImage.clientWidth;
        imgHeight = cropImage.clientHeight;
        if (imgWidth === 0 || imgHeight === 0) return;

        let dims = getTargetDimensions();
        let targetRatio = dims.w / dims.h;
        if (cropImage.naturalWidth <= 864 && cropImage.naturalHeight <= 486) {
            targetRatio = cropImage.naturalWidth / cropImage.naturalHeight;
        }

        if (cropDataArray[currentIndex]) {
            let saved = cropDataArray[currentIndex];
            let scale = imgWidth / saved.imgWidth;
            boxWidth = saved.boxWidth * scale;
            boxHeight = saved.boxHeight * scale;
            boxLeft = saved.boxLeft * scale;
            boxTop = saved.boxTop * scale;
        } else {
            if (imgWidth / imgHeight > targetRatio) {
                boxHeight = imgHeight;
                boxWidth = boxHeight * targetRatio;
            } else {
                boxWidth = imgWidth;
                boxHeight = boxWidth / targetRatio;
            }
            boxLeft = (imgWidth - boxWidth) / 2;
            boxTop = (imgHeight - boxHeight) / 2;
        }
        updateCropBoxDOM();
    }

    function openPreview(index) { currentIndex = index; updatePreview(); previewModal.style.display = "flex"; }

    function updatePreview() {
        const isCropped = selectedFiles[currentIndex].isCropped;
        if (undoCropBtn) undoCropBtn.style.display = isCropped ? "block" : "none";
        const reader = new FileReader();
        reader.onload = function (e) {
            cropImage.onload = function () { initCropBox(); };
            cropImage.src = e.target.result;
        };
        reader.readAsDataURL(selectedFiles[currentIndex]);
    }

    let isDragging = false, startX, startY, initialLeft, initialTop;
    cropBox.addEventListener("mousedown", (e) => {
        isDragging = true; startX = e.clientX; startY = e.clientY;
        initialLeft = boxLeft; initialTop = boxTop; e.stopPropagation();
    });
    window.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        let dx = e.clientX - startX, dy = e.clientY - startY;
        boxLeft = initialLeft + dx; boxTop = initialTop + dy;
        if (boxLeft < 0) boxLeft = 0;
        if (boxTop < 0) boxTop = 0;
        if (boxLeft + boxWidth > imgWidth) boxLeft = imgWidth - boxWidth;
        if (boxTop + boxHeight > imgHeight) boxTop = imgHeight - boxHeight;
        updateCropBoxDOM();
    });
    window.addEventListener("mouseup", () => { isDragging = false; });

    zoomSlider.addEventListener("input", (e) => {
        let zoomValue = parseFloat(e.target.value);
        let scale = 1.0 - (zoomValue * 0.9);
        let dims = getTargetDimensions();
        let cropRatio = dims.w / dims.h;
        if (cropImage.naturalWidth <= 864 && cropImage.naturalHeight <= 486) {
            cropRatio = cropImage.naturalWidth / cropImage.naturalHeight;
        }
        let maxBoxW = (imgWidth / imgHeight > cropRatio) ? imgHeight * cropRatio : imgWidth;
        let newBoxW = maxBoxW * scale;
        if (newBoxW < 50) newBoxW = 50;
        let newBoxH = newBoxW / cropRatio;
        let cx = boxLeft + boxWidth / 2, cy = boxTop + boxHeight / 2;
        boxWidth = newBoxW; boxHeight = newBoxH;
        boxLeft = cx - boxWidth / 2; boxTop = cy - boxHeight / 2;
        if (boxLeft < 0) boxLeft = 0;
        if (boxTop < 0) boxTop = 0;
        if (boxLeft + boxWidth > imgWidth) boxLeft = imgWidth - boxWidth;
        if (boxTop + boxHeight > imgHeight) boxTop = imgHeight - boxHeight;
        updateCropBoxDOM();
    });

    cropEditorContainer.addEventListener("wheel", (e) => {
        e.preventDefault();
        let currentZoom = parseFloat(zoomSlider.value);
        let direction = e.deltaY < 0 ? 1 : -1;
        currentZoom += direction * 0.015;
        if (currentZoom < 0) currentZoom = 0;
        if (currentZoom > 1.0) currentZoom = 1.0;
        zoomSlider.value = currentZoom;
        zoomSlider.dispatchEvent(new Event("input"));
    }, { passive: false });

    applyCropBtn.addEventListener("click", async () => {
        let dims = getTargetDimensions();
        let targetW = dims.w, targetH = dims.h;
        if (cropImage.naturalWidth <= 864 && cropImage.naturalHeight <= 486) {
            targetW = cropImage.naturalWidth; targetH = cropImage.naturalHeight;
        }
        const canvas = document.createElement("canvas");
        canvas.width = targetW; canvas.height = targetH;
        canvas.getContext("2d", { willReadFrequently: true, colorSpace: "srgb" });

        const ratioX = cropImage.naturalWidth / imgWidth;
        const ratioY = cropImage.naturalHeight / imgHeight;
        const srcX = boxLeft * ratioX, srcY = boxTop * ratioY;
        const srcW = boxWidth * ratioX, srcH = boxHeight * ratioY;

        const tempCanvas = document.createElement("canvas");
        tempCanvas.width = Math.round(srcW); tempCanvas.height = Math.round(srcH);
        const tempCtx = tempCanvas.getContext("2d", { willReadFrequently: true, colorSpace: "srgb" });
        tempCtx.drawImage(cropImage, Math.round(srcX), Math.round(srcY), Math.round(srcW), Math.round(srcH), 0, 0, Math.round(srcW), Math.round(srcH));

        const picaRunner = window.pica({ features: ['js', 'wasm'] });
        await picaRunner.resize(tempCanvas, canvas, { quality: 3, alpha: true });

        canvas.toBlob(blob => {
            let oldFile = selectedFiles[currentIndex];
            let newFile = new File([blob], oldFile.name, { type: oldFile.type || "image/jpeg" });
            newFile.isCropped = true;
            newFile.originalFile = oldFile.originalFile || oldFile;
            selectedFiles[currentIndex] = newFile;
            cropDataArray[currentIndex] = null;
            renderThumbnails();
            updatePreview();
        }, selectedFiles[currentIndex].type || "image/png", 0.95);
    });

    undoCropBtn.addEventListener("click", () => {
        let file = selectedFiles[currentIndex];
        if (file.originalFile) {
            selectedFiles[currentIndex] = file.originalFile;
            cropDataArray[currentIndex] = null;
            renderThumbnails();
            updatePreview();
        }
    });

    prevBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        currentIndex = (currentIndex - 1 + selectedFiles.length) % selectedFiles.length;
        updatePreview();
    });
    nextBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        currentIndex = (currentIndex + 1) % selectedFiles.length;
        updatePreview();
    });
    closeModalBtn.addEventListener("click", () => { previewModal.style.display = "none"; });
    previewModal.addEventListener("mousedown", (e) => { if (e.target === previewModal) previewModal.style.display = "none"; });

    /* ============================ LOGO LOADING ============================ */
    let cachedLogo = null;        // AA-Logo.png     (1080x720 / 1080x1080 / 1080x1350)
    let cachedLogo486 = null;     // AA-Logo-486.png (864x486)
    let cachedAALogo978 = null;   // AALogo.png      (978x548)
    let logosReady = false;
    const globalPica = window.pica({ features: ['js', 'wasm'] });

    function loadImg(src) {
        return new Promise((resolve, reject) => {
            const im = new Image();
            im.onload = () => resolve(im);
            im.onerror = () => reject(new Error("logo load failed: " + src));
            im.src = src;
        });
    }

    async function ensureLogos() {
        if (logosReady) return true;

        // Custom logo override (uploaded once, saved in localStorage) — used for all sizes.
        let customSrc = null;
        try { customSrc = localStorage.getItem('aa_customLogo'); } catch (e) {}

        try {
            if (customSrc) {
                const c = await loadImg(customSrc);
                cachedLogo = cachedLogo486 = cachedAALogo978 = c;
            } else {
                cachedLogo      = await loadImg(AA_LOGO_MAIN);
                cachedLogo486   = await loadImg(AA_LOGO_486).catch(() => cachedLogo);
                cachedAALogo978 = await loadImg(AA_LOGO_978).catch(() => cachedLogo);
            }
            logosReady = true;
            logoWarn.style.display = "none";
            return true;
        } catch (e) {
            showLogoWarning();
            return false;
        }
    }

    function showLogoWarning() {
        logoWarn.innerHTML = t('fn_warn')(t('logo_upload'));
        logoWarn.style.display = "block";
        const btn = document.getElementById('uploadLogoBtn');
        const inp = document.getElementById('logoFileInput');
        btn.onclick = () => inp.click();
        inp.onchange = (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const r = new FileReader();
            r.onload = () => {
                try { localStorage.setItem('aa_customLogo', r.result); } catch (err) {}
                logosReady = false;
                ensureLogos().then(ok => { if (ok) setStatus(t('st_logosaved')); });
            };
            r.readAsDataURL(f);
        };
    }

    /* ============================ PROCESS ============================ */
    processBtn.addEventListener("click", async () => {
        if (selectedFiles.length === 0) { setStatus(t('st_addfirst')); return; }

        const originalText = processBtn.innerText;
        processBtn.innerText = t('p_processing');
        processBtn.disabled = true;
        setStatus("");

        const ok = await ensureLogos();
        if (!ok) { processBtn.textContent = t('process'); processBtn.disabled = false; return; }

        const isGifMode = document.getElementById("gifCheckbox").checked;
        const openInPp = document.getElementById("openInPpCheckbox").checked;

        /* -------- GIF mode -------- */
        if (isGifMode) {
            processBtn.innerText = t('p_photos');
            const gif = new window.GIF({ workers: 2, quality: 10, workerScript: 'gif.worker.js' });
            for (let i = 0; i < selectedFiles.length; i++) {
                const canvas = await processImage(selectedFiles[i], cropDataArray[i], true);
                gif.addFrame(canvas, { delay: 2000 });
            }
            processBtn.innerText = t('p_gif');
            gif.on('finished', async function (blob) {
                let firstFilename = (selectedFiles[0].name || "animasyon").split('.')[0] || "animasyon";
                if (openInPp && inPhotopea) {
                    await openBlobInPhotopea(blob);
                    setStatus(t('st_gifopen'));
                } else {
                    downloadBlob(blob, firstFilename + ".gif");
                    setStatus(t('st_gifdl'));
                }
                resetAfterProcess(originalText);
            });
            gif.render();
            return;
        }

        /* -------- Normal mode -------- */
        const results = [];       // {name, blob}
        const CONCURRENCY = 8;
        for (let i = 0; i < selectedFiles.length; i += CONCURRENCY) {
            const chunkFiles = selectedFiles.slice(i, i + CONCURRENCY);
            const chunkCrops = cropDataArray.slice(i, i + CONCURRENCY);
            const chunkResults = await Promise.all(
                chunkFiles.map((file, idx) => processImage(file, chunkCrops[idx]))
            );
            chunkResults.forEach(r => results.push(r));
            setStatus(t('fn_proc')(Math.min(i + CONCURRENCY, selectedFiles.length), selectedFiles.length));
        }

        if (openInPp && inPhotopea) {
            for (const r of results) { await openBlobInPhotopea(r.blob); }
            setStatus(t('fn_open')(results.length));
        } else if (results.length === 1) {
            downloadBlob(results[0].blob, results[0].name);
            setStatus(t('st_downloaded'));
        } else {
            await downloadAsZip(results);
            setStatus(t('fn_zip')(results.length));
        }
        resetAfterProcess(originalText);
    });

    function resetAfterProcess(originalText) {
        selectedFiles = [];
        cropDataArray = [];
        thumbnailContainer.innerHTML = "";
        fileInput.value = "";
        gifCheckbox.checked = false;
        gifHint.style.display = "none";
        processBtn.textContent = t('process');
        processBtn.disabled = false;
    }

    // returnCanvas=true -> returns the finished <canvas> (for GIF frames)
    // otherwise -> returns { name, blob }
    async function processImage(file, cropData, returnCanvas = false) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = function (event) {
                const img = new Image();
                img.onload = async function () {
                    let dims = getTargetDimensions();
                    let targetW = dims.w, targetH = dims.h;
                    if (img.width <= 864 && img.height <= 486) { targetW = img.width; targetH = img.height; }

                    const canvas = document.createElement("canvas");
                    canvas.width = targetW; canvas.height = targetH;
                    const ctx = canvas.getContext("2d", { willReadFrequently: true, colorSpace: "srgb" });

                    ctx.fillStyle = "#111";
                    ctx.fillRect(0, 0, targetW, targetH);

                    let srcX = 0, srcY = 0, srcW = img.width, srcH = img.height;
                    if (cropData && cropData.boxWidth !== undefined && !file.isCropped) {
                        const ratioX = img.width / cropData.imgWidth;
                        const ratioY = img.height / cropData.imgHeight;
                        srcX = cropData.boxLeft * ratioX;
                        srcY = cropData.boxTop * ratioY;
                        srcW = cropData.boxWidth * ratioX;
                        srcH = cropData.boxHeight * ratioY;
                    } else {
                        const targetRatio = targetW / targetH;
                        const imgRatio = img.width / img.height;
                        if (imgRatio > targetRatio) {
                            srcW = img.height * targetRatio;
                            srcX = (img.width - srcW) / 2;
                        } else {
                            srcH = img.width / targetRatio;
                            srcY = (img.height - srcH) / 2;
                        }
                    }

                    const tempCanvas = document.createElement("canvas");
                    tempCanvas.width = Math.round(srcW);
                    tempCanvas.height = Math.round(srcH);
                    const tempCtx = tempCanvas.getContext("2d", { willReadFrequently: true, colorSpace: "srgb" });
                    tempCtx.drawImage(img, Math.round(srcX), Math.round(srcY), Math.round(srcW), Math.round(srcH), 0, 0, Math.round(srcW), Math.round(srcH));

                    let unsharpAmount = 70, unsharpRadius = 0.7;
                    if (file.isCropped) { unsharpAmount = 35; unsharpRadius = 0.6; }

                    await globalPica.resize(tempCanvas, canvas, {
                        quality: 3, alpha: true,
                        unsharpAmount, unsharpRadius, unsharpThreshold: 16
                    });

                    // pick the logo variant by final canvas size
                    let currentLogo = cachedLogo;
                    let is978x548 = false;
                    if ((dims.w === 864 && dims.h === 486) || (canvas.width === 864 && canvas.height === 486)) {
                        currentLogo = cachedLogo486;
                    } else if ((dims.w === 978 && dims.h === 548) || (canvas.width === 978 && canvas.height === 548)) {
                        currentLogo = cachedAALogo978;
                        is978x548 = true;
                    }

                    const isLeftLogo = document.getElementById("leftLogoCheckbox").checked;
                    let x, y;
                    if (is978x548) {
                        x = isLeftLogo ? 50 : canvas.width - currentLogo.width - 50;
                        y = canvas.height - currentLogo.height - 38;
                    } else {
                        x = isLeftLogo ? 53 : canvas.width - currentLogo.width - 53;
                        y = canvas.height - currentLogo.height - 53;
                    }
                    ctx.drawImage(currentLogo, x, y);

                    if (returnCanvas) { resolve(canvas); return; }

                    const outType = (file.type && file.type !== "application/octet-stream") ? file.type : "image/jpeg";
                    canvas.toBlob(function (blob) {
                        resolve({ name: logoluName(file.name || "gorsel.jpg"), blob });
                    }, outType, 0.95);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function logoluName(name) {
        const i = name.lastIndexOf('.');
        if (i > 0) return name.slice(0, i) + "-logolu" + name.slice(i);
        return name + "-logolu.jpg";
    }

    /* ============================ OUTPUT ============================ */
    function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 4000);
    }

    async function downloadAsZip(results) {
        const zip = new JSZip();
        const folder = zip.folder("Logolu Fotoğraflar");
        results.forEach(r => folder.file(r.name, r.blob));
        const content = await zip.generateAsync({ type: "blob" });
        downloadBlob(content, "Logolu-Fotograflar.zip");
    }

    /* ============================ PHOTOPEA BRIDGE ============================ */
    // Open a produced blob back in Photopea as a new document.
    async function openBlobInPhotopea(blob) {
        const buf = await blob.arrayBuffer();
        window.parent.postMessage(buf, "*");
        // give Photopea a moment between opens
        await new Promise(res => setTimeout(res, 400));
    }

    // Import the currently open Photopea document into the tool.
    const importBtn = document.getElementById("importBtn");
    let awaitingImport = false;
    let importTimer = null;

    if (!inPhotopea) {
        importBtn.disabled = true;
        importBtn.title = t('import_title_off');
    }

    importBtn.addEventListener("click", () => {
        if (!inPhotopea) { setStatus(t('st_import_off')); return; }
        awaitingImport = true;
        setStatus(t('st_importing'));
        // saveToOE sends the active document back to us as an ArrayBuffer.
        window.parent.postMessage('app.activeDocument.saveToOE("png")', "*");
        clearTimeout(importTimer);
        importTimer = setTimeout(() => {
            if (awaitingImport) {
                awaitingImport = false;
                setStatus(t('st_noresp'));
            }
        }, 6000);
    });

    window.addEventListener("message", async (event) => {
        const data = event.data;
        // Photopea returns the exported document as an ArrayBuffer, then a "done" string.
        if (awaitingImport && data instanceof ArrayBuffer) {
            awaitingImport = false;
            clearTimeout(importTimer);
            const blob = new Blob([data], { type: "image/png" });
            const file = new File([blob], "photopea-" + Date.now() + ".png", { type: "image/png" });
            file.isImported = true;
            await handleFiles([file]);
            setStatus(t('st_imported'));
        }
    });

    /* ============================ KEYBOARD ============================ */
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && previewModal.style.display !== "flex") {
            e.preventDefault();
            processBtn.click();
        }
    });

    /* Pre-load logos quietly on open so the first run is instant / warnings show early. */
    ensureLogos();
    applyLang();
    </script>
</body>

</html>
